<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Further Reading: Context Engineering</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@300;400;500;600;700;800&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles/theme.css">
<style>
  .slide-content {
    display: flex;
    flex-direction: column;
    padding: 48px 64px;
    height: 100%;
  }

  .slide-inner {
    display: flex;
    flex-direction: column;
    height: 100%;
  }

  /* === MAIN CONTENT === */
  .content-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 24px;
    margin-top: 32px;
  }

  /* === DIAGRAM SECTION === */
  .diagram-section {
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .diagram-image {
    max-width: 100%;
    max-height: 280px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .diagram-image:hover {
    filter: brightness(1.1);
  }

  .diagram-image.zoomed {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    max-width: 90vw;
    max-height: 90vh;
    z-index: 9999;
    box-shadow: 0 0 60px rgba(0,0,0,0.8);
    cursor: zoom-out;
  }

  .diagram-source {
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 8px;
  }

  /* Overlay for zoomed state */
  .zoom-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.85);
    z-index: 9998;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }

  .zoom-overlay.active {
    opacity: 1;
    pointer-events: auto;
  }

  /* === ARTICLE CARD === */
  .article-section {
    display: flex;
    justify-content: center;
  }

  .article-card {
    display: flex;
    align-items: center;
    gap: 20px;
    background: linear-gradient(135deg, rgba(168, 85, 247, 0.12) 0%, rgba(168, 85, 247, 0.04) 100%);
    border: 1px solid rgba(168, 85, 247, 0.25);
    border-radius: 12px;
    padding: 20px 28px;
    text-decoration: none;
    transition: all 0.3s ease;
    max-width: 680px;
    width: 100%;
  }

  .article-card:hover {
    background: linear-gradient(135deg, rgba(168, 85, 247, 0.2) 0%, rgba(168, 85, 247, 0.08) 100%);
    border-color: rgba(168, 85, 247, 0.4);
    transform: translateY(-2px);
  }

  .article-icon {
    flex-shrink: 0;
    width: 48px;
    height: 48px;
    background: rgba(168, 85, 247, 0.2);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
  }

  .article-info {
    flex: 1;
  }

  .article-source {
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--accent);
    margin-bottom: 4px;
  }

  .article-title {
    font-family: 'Urbanist', sans-serif;
    font-size: 16px;
    font-weight: 600;
    color: var(--text-primary);
    margin: 0;
  }

  .article-arrow {
    flex-shrink: 0;
    font-size: 20px;
    color: var(--accent);
  }

  /* === RESPONSIVE === */
  @media (max-width: 768px) {
    .slide-content {
      padding: 32px 40px;
    }

    .article-card {
      flex-direction: column;
      text-align: center;
      padding: 24px;
    }

    .article-arrow {
      transform: rotate(90deg);
    }

    .diagram-image {
      max-height: 200px;
    }
  }
</style>
</head>
<body>

<div class="slide slide-content">
  <div class="slide-inner">
    <div class="section-label">Further Reading</div>
    <h1>Context Engineering</h1>
    <p class="lead">Explore the evolution from prompt engineering to context engineering</p>

    <div class="content-area">
      <!-- DIAGRAM -->
      <div class="diagram-section">
        <img src="https://www-cdn.anthropic.com/images/4zrzovbb/website/faa261102e46c7f090a2402a49000ffae18c5dd6-2292x1290.png" alt="Prompt engineering vs Context engineering diagram" class="diagram-image" id="diagramImage">
        <div class="diagram-source">Source: Anthropic Engineering Blog (click to zoom)</div>
      </div>

      <!-- ZOOM OVERLAY -->
      <div class="zoom-overlay" id="zoomOverlay"></div>

      <!-- ARTICLE LINK -->
      <div class="article-section">
        <a href="https://www.anthropic.com/engineering/effective-context-engineering-for-ai-agents" target="_blank" class="article-card">
          <div class="article-icon">📖</div>
          <div class="article-info">
            <div class="article-source">Anthropic Engineering</div>
            <h2 class="article-title">Effective Context Engineering for AI Agents</h2>
          </div>
          <div class="article-arrow">→</div>
        </a>
      </div>
    </div>
  </div>
</div>

<script>
(function() {
  const image = document.getElementById('diagramImage');
  const overlay = document.getElementById('zoomOverlay');
  let isZoomed = false;

  function toggleZoom(event) {
    event.stopPropagation();
    isZoomed = !isZoomed;

    if (isZoomed) {
      image.classList.add('zoomed');
      overlay.classList.add('active');
      document.body.style.overflow = 'hidden';
    } else {
      image.classList.remove('zoomed');
      overlay.classList.remove('active');
      document.body.style.overflow = '';
    }
  }

  // Click on image to zoom
  image.addEventListener('click', toggleZoom);

  // Click on overlay to close
  overlay.addEventListener('click', toggleZoom);

  // Escape key to close
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && isZoomed) {
      toggleZoom(e);
    }
  });
})();
</script>

</body>
</html>
